app:
  name: "Sistema Predicción de Fallos"
  debug: false

model_params:
  n_estimators: 100
  max_depth: 10
  min_samples_split: 5
  min_samples_leaf: 2
  cv_folds: 5

# vida_util_consumida ranges in days [mean, std, clip_low, clip_high]
vida_util_params:
  ÓPTIMO: [1250, 500, 0, 2000]
  OPERATIVO: [3500, 800, 2000, 5000]
  PREVENTIVO: [6500, 800, 5000, 8000]
  CRÍTICO: [9000, 600, 8000, 10000]

# tasa_incidencias_tecnicas threshold values
incidencias_lambda:
  BAJA: 0
  MEDIA: 1
  ALTA: 3
  CRÍTICA: 5

# costo_mto_reactivo_acumulado ranges [min, max]
costo_params:
  BAJO: [0, 3000]
  MEDIO: [3000, 10000]
  REGULAR: [10000, 25000]
  ALTO: [25000, 40000]

equipment_types:
  - "Computadora de Escritorio"
  - "Impresora"
  - "Servidor"
  - "Laptop"
  - "Proyector"

locations:
  - "UDLAPARK"
  - "GRANADOS"
  - "COLON"

hardware_states:
  - "Excelente"
  - "Bueno"
  - "Regular"
  - "Critico"

risk_levels:
  - "Bajo"
  - "Medio"
  - "Alto"
  - "Critico"
