app:
  name: "Sistema Predicción de Riesgo Operativo"
  debug: false

model_params:
  n_estimators: 100
  max_depth: 10
  min_samples_split: 5
  min_samples_leaf: 2
  cv_folds: 5
  # Number of random parameter combinations tried by RandomizedSearchCV
  n_iter_search: 25

# useful_life_consumed ranges in days [min, max] for dashboard filters
useful_life_params:
  NUEVO: [0, 730]
  OPERATIVO: [730, 1825]
  MADURO: [1825, 2920]
  DEPRECIADO: [2920, 100000]

device_types:
  - "Computadora de Escritorio"
  - "Laptop"
  - "Proyector"
  - "Impresora"

brands:
  - "HP"
  - "Dell"
  - "Epson"
  - "NEC"
  - "Canon"

locations:
  - "Park"
  - "Granados"
  - "Colon"

# Orden ordinal de mejor a peor (OrdinalEncoder)
hardware_states:
  - "Excelente"
  - "Bueno"
  - "Desgastado"
  - "Malo"
  - "Crítico"

# Orden ordinal de menor a mayor riesgo (OrdinalEncoder, target)
risk_levels:
  - "Muy Bajo"
  - "Bajo"
  - "Medio"
  - "Alto"
  - "Muy Alto"
